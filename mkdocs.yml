site_name: LiveKit Agents API
site_url: https://api-livekit-vyom.indusnettechnologies.com/
site_description: API documentation for LiveKit Agents - voice AI platform
copyright: Copyright 2026 - All rights reserved
repo_url: https://github.com/shubhamINT/api_livekit
repo_name: shubhamINT/api_livekit
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.prune
    - navigation.path
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: slate
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: slate
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/premium.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md

  - API Reference:
    - API Response and Errors: api/errors.md
    - Authentication and API Keys: api/authentication.md
    - Operations:
      - Health Check: api/health.md
      - Documentation Endpoint: api/documentation.md

    - Assistants:
      - Overview: api/assistant/index.md
      - Create Assistant: api/assistant/create.md
      - List Assistants: api/assistant/list.md
      - Get Details: api/assistant/get.md
      - Update Assistant: api/assistant/update.md
      - Delete Assistant: api/assistant/delete.md
      - Call Logs: api/assistant/logs.md
      - Using Placeholders: api/assistant/placeholders.md
      - TTS Humanization Prompting:
        - Overview: api/assistant/tts-humanization.md
        - Sarvam Prompt (Exact): api/assistant/humanization/tts_humanification_sarvam.md
        - Cartesia Prompt (Exact): api/assistant/humanization/tts_humanification_cartesia.md
        - ElevenLabs Prompt (Exact): api/assistant/humanization/tts_humanification_elevenlabs.md

    - Tools:
      - Overview: api/tools/index.md
      - Create Tool: api/tools/create.md
      - List Tools: api/tools/list.md
      - Get Details: api/tools/get.md
      - Update Tool: api/tools/update.md
      - Delete Tool: api/tools/delete.md
      - Attach Tools: api/tools/attach.md
      - Detach Tools: api/tools/detach.md
      - Webhook Payload: api/tools/webhook.md
      - Design Guidelines: api/tools/design.md

    - Outbound Calls:
